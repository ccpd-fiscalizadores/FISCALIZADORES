<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA FISCALIZADORES - GESTIÓN PROFESIONAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --azul-claro: #4dc3e6;
            --bg-gris: #0d1117;
            --card-bg: #161b22;
            --texto: #c9d1d9;
            --borde: #30363d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-gris); color: var(--texto); line-height: 1.6; }

        .btn-new { 
            background: var(--azul-claro); color: #000; border: none; padding: 12px 25px; 
            border-radius: 8px; font-weight: 800; cursor: pointer;
        }

        header { background: #000; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--azul-claro); }
        .search-section { background: var(--card-bg); padding: 20px 40px; display: flex; gap: 20px; border-bottom: 1px solid var(--borde); }
        .search-input { flex-grow: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--borde); background: #0d1117; color: white; outline: none; }

        .container { padding: 30px 40px; }
        .grid-folder { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .folder-card { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--borde); text-align: center; cursor: pointer; transition: 0.3s; }
        .folder-card:hover { border-color: var(--azul-claro); transform: scale(1.02); }
        
        .card-img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid var(--azul-claro); margin-bottom: 10px; }

        .cv-sheet { max-width: 900px; margin: 20px auto; background: var(--card-bg); border-radius: 12px; overflow: hidden; display: flex; flex-wrap: wrap; border: 1px solid var(--borde); }
        .cv-header-block { width: 100%; padding: 40px; background: #000; text-align: center; border-bottom: 1px solid var(--borde); }
        .cv-photo { width: 160px; height: 160px; border-radius: 50%; border: 3px solid var(--azul-claro); object-fit: cover; }

        .cv-aside { width: 35%; background: #050a14; padding: 30px; border-right: 1px solid var(--borde); }
        .cv-main { width: 65%; padding: 40px; }

        .editor-box { max-width: 700px; margin: 30px auto; background: var(--card-bg); padding: 40px; border-radius: 15px; border: 1px solid var(--borde); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, textarea { background: #0d1117; border: 1px solid var(--borde); color: white; padding: 12px; border-radius: 8px; width: 100%; margin-top: 5px; }
        label { font-size: 0.75rem; color: var(--azul-claro); font-weight: bold; }

        .btn-volver { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .btn-cancelar { background: #ff4d4d; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin-top: 10px; }

        #vistaDashboard, #vistaCV, #vistaEditor, #vistaLogin { display: none; }
    </style>
</head>
<body onload="checkLogin()">

    <div id="vistaLogin" style="height: 100vh; display: flex; align-items: center; justify-content: center; background: #000;">
        <div style="background: var(--card-bg); padding: 40px; border-radius: 15px; text-align: center; border: 1px solid var(--borde);">
            <h2 style="color: var(--azul-claro); margin-bottom: 20px;">SISTEMA</h2>
            <input type="text" id="userInput" placeholder="Usuario"><br><br>
            <input type="password" id="passInput" placeholder="Contraseña"><br><br>
            <button class="btn-new" style="width: 100%;" onclick="login()">ENTRAR</button>
        </div>
    </div>

    <div id="vistaDashboard">
        <header>
            <h1>FISCALIZADORES</h1>
            <button onclick="logout()" style="color: gray; background: none; border: none; cursor: pointer;">Cerrar Sesión</button>
        </header>
        <div class="search-section">
            <input type="text" id="inputBusqueda" class="search-input" placeholder="Buscar..." onkeyup="buscador()">
            <button class="btn-new" onclick="abrirEditor()">+ NUEVO REGISTRO</button>
        </div>
        <div class="container">
            <button id="btnVolver" class="btn-volver" onclick="volverAtras()" style="display:none;">← VOLVER</button>
            <h2 id="txtTitulo" style="margin-bottom: 20px;">CIUDADES:</h2>
            <div id="mainGrid" class="grid-folder"></div>
        </div>
    </div>

    <div id="vistaCV">
        <div style="padding: 20px 40px;">
            <button class="btn-volver" onclick="irDashboard()">← VOLVER AL LISTADO</button>
        </div>
        <div id="cvDetalle" class="cv-sheet"></div>
    </div>

    <div id="vistaEditor">
        <div class="editor-box">
            <h2 id="editorTitulo" style="color: var(--azul-claro); margin-bottom: 20px;">Editar Miembro</h2>
            <div class="form-grid">
                <div style="grid-column: span 2; text-align: center;">
                    <img id="prevImg" src="https://via.placeholder.com/100" style="width:100px; height:100px; border-radius:50%; object-fit:cover;">
                    <input type="file" id="fileInput" onchange="procesarFoto(this)" style="display: none;">
                    <button onclick="document.getElementById('fileInput').click()" style="display:block; margin: 10px auto; cursor:pointer;">Cambiar Foto</button>
                </div>
                <div style="grid-column: span 2;"><label>Nombre Completo</label><input type="text" id="inNom"></div>
                <div><label>N° de Documento</label><input type="text" id="inDoc"></div>
                <div><label>Fecha de Nacimiento</label><input type="date" id="inNac" onchange="calcularEdad(this.value)"></div>
                <div><label>Edad Calculada</label><input type="text" id="inEdad" readonly style="background:#050a14;"></div>
                <div><label>WhatsApp</label><input type="text" id="inTel"></div>
                <div><label>Ciudad</label><input type="text" id="inCiu"></div>
                <div><label>Congregación</label><input type="text" id="inCong"></div>
                <div><label>Estado Civil</label><input type="text" id="inEstCiv"></div>
                <div style="grid-column: span 2;"><label>Historial / Notas</label><textarea id="inHist" rows="4"></textarea></div>
                
                <button class="btn-new" style="grid-column: span 2;" onclick="guardar()">GUARDAR REGISTRO</button>
                <button class="btn-cancelar" style="grid-column: span 2;" onclick="irDashboard()">CANCELAR Y SALIR</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBkP6NALOTSHGd4QVgAxHyeJzCCnOUDY6M",
            authDomain: "fiscalizadores-elite.firebaseapp.com",
            projectId: "fiscalizadores-elite",
            storageBucket: "fiscalizadores-elite.firebasestorage.app",
            messagingSenderId: "482161512140",
            appId: "1:482161512140:web:95dd229a858ab627a03c69"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let dataLocal = [];
        let tmpFoto = "";
        let nivelActual = "ciudades";
        let ciudadSel = "";
        let idEdicion = null;

        function login() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            if(u === "admin" && p === "crist2026") {
                localStorage.setItem("sesion", "ok");
                location.reload();
            } else { alert("Error de acceso"); }
        }

        function checkLogin() {
            if(localStorage.getItem("sesion") === "ok") {
                document.getElementById('vistaDashboard').style.display = 'block';
                escuchar();
            } else {
                document.getElementById('vistaLogin').style.display = 'flex';
            }
        }

        function logout() { localStorage.clear(); location.reload(); }

        function escuchar() {
            db.collection("curriculums").onSnapshot(qs => {
                dataLocal = [];
                qs.forEach(doc => dataLocal.push({ id: doc.id, ...doc.data() }));
                if(nivelActual === "ciudades") renderCiudades();
            });
        }

        function calcularEdad(fecha) {
            if(!fecha) return;
            const hoy = new Date();
            const nac = new Date(fecha);
            let edad = hoy.getFullYear() - nac.getFullYear();
            if (hoy.getMonth() < nac.getMonth() || (hoy.getMonth() === nac.getMonth() && hoy.getDate() < nac.getDate())) edad--;
            document.getElementById('inEdad').value = edad + " años";
        }

        function renderCiudades() {
            nivelActual = "ciudades";
            document.getElementById('btnVolver').style.display = 'none';
            document.getElementById('txtTitulo').innerText = "CIUDADES:";
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = "";
            const ciudades = [...new Set(dataLocal.map(x => x.ciudad))];
            ciudades.forEach(c => {
                grid.innerHTML += `<div class="folder-card" onclick="verCongs('${c}')">📍 <h3>${c}</h3></div>`;
            });
        }

        function verCongs(ciu) {
            nivelActual = "congs"; ciudadSel = ciu;
            document.getElementById('btnVolver').style.display = 'block';
            document.getElementById('txtTitulo').innerText = "CONGREGACIONES EN " + ciu;
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = "";
            const congs = [...new Set(dataLocal.filter(x => x.ciudad === ciu).map(x => x.cong))];
            congs.forEach(co => {
                grid.innerHTML += `<div class="folder-card" onclick="verFisc('${ciu}', '${co}')">⛪ <h3>${co}</h3></div>`;
            });
        }

        function verFisc(ciu, con) {
            nivelActual = "fisc";
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = "";
            dataLocal.filter(x => x.ciudad === ciu && x.cong === con).forEach(f => {
                grid.innerHTML += `<div class="folder-card" onclick="verCV('${f.id}')">
                    <img src="${f.foto || 'https://via.placeholder.com/70'}" class="card-img">
                    <h3>${f.nombre}</h3>
                </div>`;
            });
        }

        function volverAtras() {
            if(nivelActual === "fisc") verCongs(ciudadSel);
            else renderCiudades();
        }

        function irDashboard() {
            document.getElementById('vistaDashboard').style.display = 'block';
            document.getElementById('vistaCV').style.display = 'none';
            document.getElementById('vistaEditor').style.display = 'none';
            renderCiudades();
        }

        function verCV(id) {
            const f = dataLocal.find(x => x.id === id);
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'block';
            document.getElementById('cvDetalle').innerHTML = `
                <div class="cv-header-block">
                    <img src="${f.foto || ''}" class="cv-photo">
                    <h1 style="color:white; margin-top:15px;">${f.nombre}</h1>
                    <p style="color:var(--azul-claro); font-weight:bold;">${f.ciudad} | ${f.cong}</p>
                </div>
                <div class="cv-aside">
                    <p><b>DNI:</b> ${f.doc || '---'}</p>
                    <p><b>EDAD:</b> ${f.edad || '---'}</p>
                    <p><b>TEL:</b> ${f.tel || '---'}</p>
                    <button class="btn-new" style="margin-top:20px; width:100%;" onclick="abrirEditor('${f.id}')">MODIFICAR DATOS</button>
                </div>
                <div class="cv-main">
                    <h3>HISTORIAL</h3>
                    <p style="white-space:pre-line; margin-top:10px;">${f.hist || 'Sin información.'}</p>
                </div>`;
        }

        function abrirEditor(id = null) {
            idEdicion = id;
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'none';
            document.getElementById('vistaEditor').style.display = 'block';

            if(id) {
                const f = dataLocal.find(x => x.id === id);
                document.getElementById('inNom').value = f.nombre;
                document.getElementById('inDoc').value = f.doc || "";
                document.getElementById('inNac').value = f.nac || "";
                document.getElementById('inEdad').value = f.edad || "";
                document.getElementById('inTel').value = f.tel || "";
                document.getElementById('inCiu').value = f.ciudad || "";
                document.getElementById('inCong').value = f.cong || "";
                document.getElementById('inEstCiv').value = f.estCiv || "";
                document.getElementById('inHist').value = f.hist || "";
                tmpFoto = f.foto || "";
                document.getElementById('prevImg').src = f.foto || "https://via.placeholder.com/100";
            } else {
                document.querySelectorAll('#vistaEditor input, #vistaEditor textarea').forEach(i => i.value = "");
                document.getElementById('prevImg').src = "https://via.placeholder.com/100";
                tmpFoto = "";
            }
        }

        function procesarFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { tmpFoto = e.target.result; document.getElementById('prevImg').src = tmpFoto; };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function guardar() {
            const f = {
                nombre: document.getElementById('inNom').value,
                doc: document.getElementById('inDoc').value,
                nac: document.getElementById('inNac').value,
                edad: document.getElementById('inEdad').value,
                tel: document.getElementById('inTel').value,
                ciudad: document.getElementById('inCiu').value,
                cong: document.getElementById('inCong').value,
                estCiv: document.getElementById('inEstCiv').value,
                hist: document.getElementById('inHist').value,
                foto: tmpFoto,
                fecha: new Date().getTime()
            };
            if(!f.nombre || !f.ciudad) return alert("Faltan datos");
            if(idEdicion) await db.collection("curriculums").doc(idEdicion).update(f);
            else await db.collection("curriculums").add(f);
            irDashboard();
        }
    </script>
</body>
</html>
