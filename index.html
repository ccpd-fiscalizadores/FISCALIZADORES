<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FISCALIZADORES</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="FISCALIZADORES">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --texto: #f8fafc;
            --texto-sec: #94a3b8; --accent: #38bdf8; --borde: #334155;
        }
        [data-theme="light"] {
            --bg: #f1f5f9; --card: #ffffff; --texto: #1e293b;
            --texto-sec: #64748b; --accent: #0284c7; --borde: #e2e8f0;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: 0.3s;
            -webkit-tap-highlight-color: transparent;
            /* 2. CAMBIO: Deshabilita gestos de zoom por defecto en toda la app */
            touch-action: none; 
        }

        /* Permite el scroll normal pero sin zoom */
        body, #vistaDashboard, #vistaCV, #vistaEditor {
            overflow-x: hidden;
            touch-action: pan-y; 
        }

        input, select, textarea { 
            font-size: 16px !important; 
            touch-action: manipulation;
            background: var(--card);
            border: 1px solid var(--borde);
            color: var(--texto);
            padding: 12px;
            border-radius: 10px;
            width: 100%;
        }

        /* Estilos de la App */
        #vistaLogin {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 20px;
        }
        .login-card {
            background: var(--card); padding: 40px; border-radius: 24px;
            width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid var(--borde);
        }

        header { 
            background: var(--card); padding: 0.8rem 2rem; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--borde); position: sticky; top: 0; z-index: 1000; 
        }
        .logo-container { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .app-logo { height: 45px; width: auto; border-radius: 8px; }
        .logo-text { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; }

        .theme-toggle { background: var(--bg); border: 1px solid var(--borde); color: var(--texto); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: 600; }

        .btn-primary { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; }

        .grid-main { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px 40px; }
        .card-folder { background: var(--card); padding: 25px; border-radius: 18px; border: 1px solid var(--borde); text-align: center; cursor: pointer; position: relative; }
        .folder-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); margin-bottom: 15px; }
        
        .cv-container { max-width: 800px; margin: 20px auto; background: var(--card); border-radius: 24px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); margin-bottom: 50px; }
        .cv-banner { background: #000; padding: 40px 20px; text-align: center; color: white; position: relative; }
        .cv-photo { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--accent); object-fit: cover; margin-bottom: 20px; cursor: pointer; }
        .cv-name { font-size: 2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        /* OVERLAY DE IMAGEN (Aquí es donde se permite el zoom) */
        #imgOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: none; justify-content: center; 
            align-items: center; z-index: 2000; 
            /* 3. CAMBIO: Permite pellizcar y hacer zoom solo en este contenedor */
            touch-action: pinch-zoom; 
        }
        #imgOverlay img { 
            max-width: 100%; max-height: 100%; border-radius: 5px; 
            /* Asegura que la imagen responda al zoom táctil */
            touch-action: pinch-zoom; 
        }

        .cv-content { display: grid; grid-template-columns: 1fr 1.5fr; gap: 0; }
        .cv-left { background: rgba(0,0,0,0.1); padding: 40px; border-right: 1px solid var(--borde); }
        .cv-right { padding: 40px; display: flex; flex-direction: column; }

        .section-label { font-size: 0.75rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 20px; display: block; border-bottom: 1px solid var(--borde); padding-bottom: 5px; }
        .info-group { margin-bottom: 20px; }
        .info-label { font-size: 0.85rem; color: var(--texto-sec); display: block; margin-bottom: 5px; }
        .info-value { font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .historial-box { white-space: pre-line; color: var(--texto-sec); font-size: 1rem; margin-bottom: 30px; }

        .editor-box { max-width: 850px; margin: 30px auto; background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--borde); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        @media (max-width: 768px) { 
            .cv-content { grid-template-columns: 1fr; } 
            .form-grid { grid-template-columns: 1fr; } 
            .grid-main { padding: 20px; }
        }
        #mainHeader, #vistaDashboard, #vistaCV, #vistaEditor { display: none; }
    </style>
</head>
<body>

    <div id="vistaLogin">
        <div class="login-card">
            <img src="logo.png" style="height: 70px; margin-bottom: 15px; border-radius: 12px;">
            <h2 style="margin-bottom: 5px; font-weight: 800;">FISCALIZADORES</h2>
            <p style="color: var(--texto-sec); margin-bottom: 25px; font-size: 0.9rem;">Acceso restringido</p>
            <div style="text-align: left; margin-bottom: 15px;">
                <label class="info-label">Email de acceso</label>
                <input type="email" id="loginEmail" placeholder="usuario@sistema.com">
            </div>
            <div style="text-align: left; margin-bottom: 25px;">
                <label class="info-label">Contraseña</label>
                <input type="password" id="loginPass" placeholder="••••••••">
            </div>
            <button class="btn-primary" style="width: 100%;" onclick="login()">INGRESAR AL PANEL</button>
            <p id="loginError" style="color: #ff4444; margin-top: 15px; font-size: 0.85rem; font-weight: 600;"></p>
        </div>
    </div>

    <header id="mainHeader">
        <div class="logo-container" onclick="location.reload()">
            <img src="logo.png" alt="Logo" class="app-logo">
            <span class="logo-text">FISCALIZADORES<span style="color:var(--accent)">.</span></span>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <span id="userBadge" style="font-size: 0.7rem; background: var(--borde); padding: 4px 8px; border-radius: 5px; color: var(--accent); font-weight: 800; text-transform: uppercase;"></span>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
            <button onclick="logout()" style="background:transparent; border:none; color:#ff4444; cursor:pointer; font-weight:bold; font-size: 0.8rem; margin-left:10px;">SALIR</button>
        </div>
    </header>

    <div id="imgOverlay" onclick="this.style.display='none'"><img id="imgFull"></div>

    <div id="vistaDashboard">
        <div style="padding: 20px 40px; display: flex; gap: 15px;">
            <input type="text" id="busqueda" placeholder="Buscar ciudad, congregación o nombre..." style="flex:1" onkeyup="buscador()">
            <button class="btn-primary" onclick="abrirEditor()">+ NUEVO</button>
        </div>
        <div style="padding: 0 40px;">
            <button id="btnBack" class="btn-outline" onclick="volverAtras()" style="display:none; margin-bottom: 20px;">← VOLVER</button>
            <h3 id="tituloTxt" style="font-weight: 800; margin-bottom: 10px;">Listado de Ciudades</h3>
        </div>
        <div id="gridMain" class="grid-main"></div>
    </div>

    <div id="vistaCV">
        <div style="padding: 20px 40px;"><button class="btn-outline" onclick="irDashboard()">← VOLVER AL LISTADO</button></div>
        <div id="cvContent" class="cv-container"></div>
    </div>

    <div id="vistaEditor">
        <div class="editor-box">
            <h2 style="margin-bottom: 25px;">Registro de Datos</h2>
            <div style="text-align: center; margin-bottom: 30px;">
                <img id="prevFoto" src="https://via.placeholder.com/120" style="width:120px; height:120px; border-radius:50%; object-fit:cover; border: 3px solid var(--accent);">
                <input type="file" id="fileIn" onchange="subirFoto(this)" style="display:none" accept="image/*">
                <button class="btn-outline" style="display:block; margin: 15px auto;" onclick="document.getElementById('fileIn').click()">Cambiar Foto de Perfil</button>
            </div>
            <div class="form-grid" id="formInputs">
                <div><label class="info-label">Nombre Completo</label><input type="text" id="inNom"></div>
                <div><label class="info-label">Fecha de Nacimiento</label><input type="date" id="inFechaNac"></div>
                <div><label class="info-label">WhatsApp</label><input type="text" id="inTel"></div>
                <div><label class="info-label">Documento</label><input type="text" id="inDoc"></div>
                <div style="grid-column: span 2;"><label class="info-label">Historial de Vida</label><textarea id="inHist" rows="5"></textarea></div>
            </div>
            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <button class="btn-primary" style="flex:2" onclick="guardar()">GUARDAR</button>
                <button class="btn-outline" style="flex:1" onclick="irDashboard()">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE (Mantener igual)
        const firebaseConfig = {
            apiKey: "AIzaSyBkP6NALOTSHGd4QVgAxHyeJzCCnOUDY6M",
            authDomain: "fiscalizadores-elite.firebaseapp.com",
            projectId: "fiscalizadores-elite",
            storageBucket: "fiscalizadores-elite.firebasestorage.app",
            messagingSenderId: "482161512140",
            appId: "1:482161512140:web:95dd229a858ab627a03c69"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const USUARIOS_SISTEMA = {
            "admi@com": { pass: "admigeneral.26", cat: "ADMIN" },
            "solteros@com": { pass: "4532", cat: "SOLTEROS" },
            "conyugales@com": { pass: "8758", cat: "CONJUGALES" },
            "suspendidos@com": { pass: "9823", cat: "SUSPENDIDOS" },
            "dacyp@com": { pass: "1630", cat: "CCPD" }
        };

        let miembros = [];
        let fotoURL = "";
        let idEdit = null;
        let nivel = "ciudades";
        let ciuSel = "";
        let congSelGlobal = "";
        let categoriaUsuario = "";

        function login() {
            const email = document.getElementById('loginEmail').value.toLowerCase();
            const pass = document.getElementById('loginPass').value;
            if (USUARIOS_SISTEMA[email] && USUARIOS_SISTEMA[email].pass === pass) {
                categoriaUsuario = USUARIOS_SISTEMA[email].cat;
                mostrarSistema();
            } else {
                document.getElementById('loginError').innerText = "Credenciales incorrectas.";
            }
        }

        function mostrarSistema() {
            document.getElementById('vistaLogin').style.display = 'none';
            document.getElementById('mainHeader').style.display = 'flex';
            document.getElementById('userBadge').innerText = categoriaUsuario;
            irDashboard();
        }

        function irDashboard() { 
            document.getElementById('vistaDashboard').style.display = 'block'; 
            document.getElementById('vistaCV').style.display = 'none'; 
            document.getElementById('vistaEditor').style.display = 'none'; 
            escuchar(); 
        }

        function escuchar() {
            db.collection("curriculums").onSnapshot(snap => {
                miembros = [];
                snap.forEach(doc => miembros.push({ id: doc.id, ...doc.data() }));
                renderCiudades();
            });
        }

        function renderCiudades() {
            const grid = document.getElementById('gridMain'); grid.innerHTML = "";
            const ciudades = [...new Set(miembros.map(m => m.ciudad))];
            ciudades.forEach(c => {
                grid.innerHTML += `<div class="card-folder" onclick="verCVsDeCiudad('${c}')"><span style="font-size:3rem;">📍</span><h3>${c}</h3></div>`;
            });
        }

        function verCV(id) {
            const m = miembros.find(x => x.id === id);
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'block';
            document.getElementById('cvContent').innerHTML = `
                <div class="cv-banner">
                    <img src="${m.foto || 'https://via.placeholder.com/160'}" class="cv-photo" onclick="abrirFotoZoom(this.src)">
                    <div class="cv-name">${m.nombre}</div>
                </div>
                <div class="cv-right" style="padding:40px;">
                    <span class="section-label">Historial</span>
                    <div class="historial-box">${m.hist || 'Sin historial.'}</div>
                    <button class="btn-primary" onclick="abrirEditor('${m.id}')">EDITAR</button>
                </div>`;
        }

        // Función específica para abrir la foto y permitir el zoom
        function abrirFotoZoom(src) {
            const overlay = document.getElementById('imgOverlay');
            const img = document.getElementById('imgFull');
            img.src = src;
            overlay.style.display = 'flex';
        }

        function abrirEditor(id = null) {
            idEdit = id;
            document.getElementById('vistaCV').style.display = 'none';
            document.getElementById('vistaEditor').style.display = 'block';
            // Lógica de llenado de campos...
        }

        function toggleTheme() {
            const b = document.documentElement;
            const t = b.getAttribute("data-theme") === "light" ? "dark" : "light";
            b.setAttribute("data-theme", t);
        }
        
        function logout() { location.reload(); }
    </script>
</body>
</html>
